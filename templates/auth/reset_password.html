{% extends "base.html" %}
{% block title %}Set New Password — ReghTechLab{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-20 bg-slate-900 border border-slate-800 p-8 rounded-xl shadow-2xl">
    <h1 class="text-2xl font-bold text-slate-100 mb-6">Set New Password</h1>

    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <div>
            <label for="password" class="block text-sm font-medium text-slate-300 mb-1">New Password</label>
            <input type="password" id="password" name="password" required minlength="8"
                   class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all">
        </div>

        <div>
            <label for="confirm_password" class="block text-sm font-medium text-slate-300 mb-1">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="8"
                   class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all">
        </div>

        <button type="submit" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-semibold py-2.5 rounded-lg transition-colors shadow-lg shadow-sky-500/20">
            Update Password
        </button>
    </form>
</div>
{% endblock %}
