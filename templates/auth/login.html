{% extends "base.html" %}
{% block title %}Login — ReghTechLab{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">

  <div class="border border-slate-800 rounded-lg overflow-hidden">
    <div class="flex items-center gap-2 px-4 py-3 
                bg-slate-950 border-b border-slate-800">
      <span class="w-3 h-3 rounded-full bg-red-500/70"></span>
      <span class="w-3 h-3 rounded-full bg-yellow-500/70"></span>
      <span class="w-3 h-3 rounded-full bg-green-500/70"></span>
      <span class="ml-3 text-xs font-mono text-slate-500">
        auth.login
      </span>
    </div>

    <div class="p-8 bg-slate-900">
      <p class="font-mono text-xs text-slate-600 mb-6">
        <span class="text-green-400">$</span>
        ssh user@reghtechlab.com
      </p>

      <h2 class="text-2xl font-bold text-white mb-1">
        Sign In
      </h2>
      <p class="text-slate-400 text-sm mb-8">
        Enter your credentials to continue.
      </p>

      <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <div>
          <label class="block text-xs font-mono 
                        text-slate-500 mb-2">
            <span class="text-sky-400">username or email</span>
          </label>
          <input type="text" name="identifier" required autofocus placeholder="john or john@example.com" class="w-full bg-slate-950 border border-slate-700 
                        rounded px-4 py-2.5 text-white text-sm
                        focus:outline-none focus:border-sky-400
                        transition placeholder-slate-600" />
        </div>

        <div>
          <label class="block text-xs font-mono 
                        text-slate-500 mb-2">
            <span class="text-sky-400">password</span>
          </label>
          <input type="password" name="password" required placeholder="••••••••" class="w-full bg-slate-950 border border-slate-700 
                        rounded px-4 py-2.5 text-white text-sm
                        focus:outline-none focus:border-sky-400
                        transition placeholder-slate-600" />
        </div>

        <div class="flex items-center gap-2">
          <input type="checkbox" name="remember" id="remember" class="w-4 h-4 accent-sky-400" />
          <label for="remember" class="text-xs font-mono text-slate-500 
                        cursor-pointer">
            Remember me
          </label>
        </div>

        <button type="submit" class="w-full bg-sky-600 hover:bg-sky-500 
                       text-white font-medium py-2.5 rounded
                       transition">
          Authenticate
        </button>
      </form>

      <p class="text-center text-slate-600 text-xs 
                font-mono mt-6">
        No account?
        <a href="{{ url_for('auth.register') }}" class="text-sky-400 hover:underline">
          Register here
        </a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
