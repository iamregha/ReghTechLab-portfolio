{% extends "base.html" %}
{% block title %}Reset Password — ReghTechLab{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-20 bg-slate-900 border border-slate-800 p-8 rounded-xl shadow-2xl">
    <h1 class="text-2xl font-bold text-slate-100 mb-2">Reset Password</h1>
    <p class="text-slate-400 mb-6 text-sm">Enter your email address and we'll send you a link to reset your password.</p>

    <form method="POST" action="{{ url_for('auth.reset_password_request') }}" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <div>
            <label for="email" class="block text-sm font-medium text-slate-300 mb-1">Email Address</label>
            <input type="email" id="email" name="email" required
                   class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all">
        </div>

        <button type="submit" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-semibold py-2.5 rounded-lg transition-colors shadow-lg shadow-sky-500/20">
            Send Reset Link
        </button>
    </form>

    <div class="mt-6 text-center text-sm text-slate-400">
        Remember your password? 
        <a href="{{ url_for('auth.login') }}" class="text-sky-400 hover:text-sky-300 transition-colors">Log In</a>
    </div>
</div>
{% endblock %}
