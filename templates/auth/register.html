{% extends "base.html" %}
{% block title %}Register — ReghTechLab{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">

  <!-- Terminal window header -->
  <div class="border border-slate-800 rounded-lg overflow-hidden">
    <div class="flex items-center gap-2 px-4 py-3 
                bg-slate-950 border-b border-slate-800">
      <span class="w-3 h-3 rounded-full bg-red-500/70"></span>
      <span class="w-3 h-3 rounded-full bg-yellow-500/70"></span>
      <span class="w-3 h-3 rounded-full bg-green-500/70"></span>
      <span class="ml-3 text-xs font-mono text-slate-500">
        auth.register
      </span>
    </div>

    <div class="p-8 bg-slate-900">
      <p class="font-mono text-xs text-slate-600 mb-6">
        <span class="text-green-400">$</span> 
        create_user --interactive
      </p>

      <h2 class="text-2xl font-bold text-white mb-1">
        Create Account
      </h2>
      <p class="text-slate-400 text-sm mb-8">
        Join ReghTechLab — write posts, comment, engage.
      </p>

      <form method="POST" action="{{ url_for('register') }}"
            class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div>
          <label class="block text-xs font-mono 
                        text-slate-500 mb-2">
            <span class="text-sky-400">username</span> *
          </label>
          <input type="text" name="username" required
                 autofocus minlength="3"
                 placeholder="your_handle"
                 class="w-full bg-slate-950 border border-slate-700 
                        rounded px-4 py-2.5 text-white text-sm
                        focus:outline-none focus:border-sky-400
                        transition placeholder-slate-600" />
        </div>

        <div>
          <label class="block text-xs font-mono 
                        text-slate-500 mb-2">
            <span class="text-sky-400">email</span> *
          </label>
          <input type="email" name="email" required
                 placeholder="you@example.com"
                 class="w-full bg-slate-950 border border-slate-700 
                        rounded px-4 py-2.5 text-white text-sm
                        focus:outline-none focus:border-sky-400
                        transition placeholder-slate-600" />
        </div>

        <div>
          <label class="block text-xs font-mono 
                        text-slate-500 mb-2">
            <span class="text-sky-400">password</span> *
            <span class="text-slate-700 ml-2">
              // min 8 characters
            </span>
          </label>
          <input type="password" name="password" required
                 minlength="8" placeholder="••••••••"
                 class="w-full bg-slate-950 border border-slate-700 
                        rounded px-4 py-2.5 text-white text-sm
                        focus:outline-none focus:border-sky-400
                        transition placeholder-slate-600" />
        </div>

        <div>
          <label class="block text-xs font-mono 
                        text-slate-500 mb-2">
            <span class="text-sky-400">confirm_password</span> *
          </label>
          <input type="password" name="confirm_password" required
                 placeholder="••••••••"
                 class="w-full bg-slate-950 border border-slate-700 
                        rounded px-4 py-2.5 text-white text-sm
                        focus:outline-none focus:border-sky-400
                        transition placeholder-slate-600" />
        </div>

        <button type="submit"
                class="w-full bg-sky-600 hover:bg-sky-500 
                       text-white font-medium py-2.5 rounded
                       transition mt-2">
          Create Account
        </button>
      </form>

      <p class="text-center text-slate-600 text-xs 
                font-mono mt-6">
        Already have an account? 
        <a href="{{ url_for('login') }}" 
           class="text-sky-400 hover:underline">
          Sign in
        </a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
