<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!--
         block title  is an extension point with default
        set to ReghtechLab, but child templates can overide it with their
        page title
    -->
    <title>{% block title %}ReghTechLab{% endblock %}</title>

    <!-- Tailwind CSS via CDN -->
     <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <!-- Navigation -->
     <nav class="boder-b border-slate-800 px-6 py-4 flex justify-between items-center">
        <!-- logo -->
        <a href="/">
            <svg width="180" height="44" viewBox="0 0 180 44" 
                fill="none" xmlns="http://www.w3.org/2000/svg">
                
                <!-- Python symbol - blue snake top -->
                <path d="M22 6c-3.3 0-6 .8-6 3v2h6v1H13c-1.7 0-3 1.3-3 4s1.3 4 3 4h2v-2c0-1.7 1.3-3 3-3h6c1.7 0-3-1.3 3-3V9c0-2.2-2.7-3-6-3z" 
                    fill="#4B8BBE"/>
                <circle cx="19.5" cy="9.5" r="1.5" fill="white"/>
                
                <!-- Python symbol - yellow snake bottom -->
                <path d="M22 38c3.3 0 6-.8 6-3v-2h-6v-1h9c1.7 0 3-1.3 3-4s-1.3-4-3-4h-2v2c0 1.7-1.3 3-3 3h-6c-1.7 0-3 1.3-3 3v3c0 2.2 2.7 3 6 3z" 
                    fill="#FFD43B"/>
                <circle cx="24.5" cy="34.5" r="1.5" fill="white"/>

                <!-- Regh — amber/yellow -->
                <text x="48" y="28" 
                    font-family="Arial, sans-serif" 
                    font-weight="700" 
                    font-size="20" 
                    fill="#FFD43B">Regh</text>

                <!-- TechLab — sky blue -->
                <text x="89" y="28" 
                    font-family="Arial, sans-serif" 
                    font-weight="700" 
                    font-size="20" 
                    fill="#4B8BBE">TechLab</text>
            </svg>
        </a>
        <div class="flex gap-6 text-sm text-slate-400">
            <a href="/" class="hover:text-white transition">Home</a>
            <a href="/blog" class="hover:text-white transition">Blog</a>
            <a href="/about" class="hover:text-white transition">About</a>            
        </div>
     </nav>
    
     <!-- Main content -->
      <main class="max-w-6xl mx-auto px-6 py-12">
        {% block content %} {% endblock %}
      </main>

      <!-- Footer -->
       <footer class="border-t border-slate-800 text-center py-6 text-slate-600 text-sm">
            &copy; 2026 ReghTechLab &mdash; Built with Python &amp; Flask
       </footer>
</body>
</html>
