{% extends"base.html" %}
{% block title %}429 Too Many Requests — ReghTechLab{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-20 text-center">
    <p class="text-6xl font-bold text-amber-500 mb-4 font-mono">429</p>
    <h1 class="text-3xl font-bold mb-4">Rate Limit Exceeded</h1>
    <p class="text-slate-500 mb-8">
        {{ description }}
    </p>
    <p class="text-slate-500 mb-8 text-sm">
        Please wait a moment before trying again.
    </p>
    <a href="{{ url_for('main.index') }}" 
       class="inline-block bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded transition font-medium">
        Return Home
    </a>
</div>
{% endblock %}
